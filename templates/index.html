<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Tahoma, Arial; background: #f4f4f4; padding: 20px; line-height: 1.6; }
        .news-card { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .title { color: #2c3e50; text-decoration: none; font-weight: bold; font-size: 1.2em; }
        /* جلوگیری از بهم ریختگی کلمات انگلیسی */
        p, a, h1 { unicode-bidi: embed; direction: rtl; text-align: right; }
    </style>
</head>
<body>
    <h1>آخرین اخبار تحلیل ایران</h1>
    {% for item in news %}
    <div class="news-card">
        <a href="/news/{{ item[0] }}" class="title">{{ item[1] }}</a>
        <p>منبع: {{ item[2] }} | زمان: {{ item[3] }}</p>
    </div>
    {% endfor %}
</body>
</html>
