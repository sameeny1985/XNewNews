<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحلیل ایران | آخرین اخبار</title>

    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background-color: #1a237e;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .news-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        .title-link {
            text-decoration: none;
            color: #d32f2f;
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .meta {
            font-size: 0.85rem;
            color: #757575;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .summary {
            color: #424242;
            line-height: 1.8;
            font-size: 1rem;
        }

        .btn-more {
            display: inline-block;
            margin-top: 15px;
            color: #1a237e;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-more:hover {
            text-decoration: underline;
        }

        #newsReaderBtn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(27,94,32,0.85);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-family: Tahoma, sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        #newsReaderBtn:hover {
            transform: scale(1.05);
        }

        /* پنهان کردن مخزن متنی صوتی از دید کاربر */
        .audio-source-hidden {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            width: 0 !important;
            height: 0 !important;
        }

        @media(max-width:768px){
            #newsReaderBtn{
                left:15px;
                bottom:15px;
                padding:12px 18px;
                font-size:14px;
            }
            .title-link{
                font-size:1.1rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>XNew News</h1>
            <p>بروزرسانی لحظه‌ای اخبار منابع مختلف</p>
        </header>

        {% for item in news %}
        <div class="news-card">
            <a href="/news/{{ item['id'] }}" class="title-link">
                {{ item['title_fa'] }}
            </a>

            <span class="audio-source-hidden data-text-only">{{ item['title_fa'] }}</span>

            <div class="meta">
                <span>منبع: <b>{{ item['source'] }}</b></span> | 
                <span>زمان انتشار: {{ item['pub_date'] }}</span>
            </div>

            <div class="summary">
                {{ item['desc_fa'][:250] }}...
            </div>

            <a href="/news/{{ item['id'] }}" class="btn-more">ادامه مطلب و شرح کامل خبر ←</a>
        </div>
        {% endfor %}

    </div>

    <button id="newsReaderBtn" onclick="toggleSpeech()">
        <span id="btnIcon">🎙️</span>
        <span id="btnText">گوش دادن به اخبار</span>
    </button>

    <script>
        const synth = window.speechSynthesis;
        let isReading = false;
        let currentUtterance = null;

        function updateButton(reading) {
            const btnText = document.getElementById("btnText");
            const btnIcon = document.getElementById("btnIcon");
            const btn = document.getElementById("newsReaderBtn");

            if (reading) {
                btnText.innerText = "توقف خواندن";
                btnIcon.innerText = "🛑";
                btn.style.background = "rgba(183,28,28,0.92)";
            } else {
                btnText.innerText = "گوش دادن به اخبار";
                btnIcon.innerText = "🎙️";
                btn.style.background = "rgba(27,94,32,0.85)";
            }
        }

        function toggleSpeech() {
            if (isReading) {
                isReading = false;
                synth.cancel();
                updateButton(false);
                return;
            }

            // خواندن انحصاری از مخزن پنهان متن خالص
            const elements = document.querySelectorAll(".data-text-only");
            let combinedText = "";

            elements.forEach((el) => {
                if (el && el.textContent) {
                    let txt = el.textContent.trim();
                    
                    // حذف کامل کلمات انگلیسی، آدرس‌ها و نشانه‌های شبکه اجتماعی
                    txt = txt.replace(/https?:\/\/\S+/g, ''); 
                    txt = txt.replace(/@[A-Za-z0-9_]+/g, ''); 
                    txt = txt.replace(/[A-Za-z]/g, '');       
                    
                    // فیلتر نهایی شدید: حذف هر چیزی که حرف فارسی یا عدد فارسی/عربی نیست
                    txt = txt.replace(/[^آاأإبپتثجچحخدذرزژسشصضطظعغفقکگلمنوهیًٌٍَُِّءیٓ‌\s0-9۰-۹]/g, ' ');
                    txt = txt.replace(/\s+/g, ' ').strip ? txt.replace(/\s+/g, ' ').trim() : txt.trim();
                    
                    if (txt.length > 2) {
                        combinedText += txt + " ، ، خبر بعدی ، ، ";
                    }
                }
            });

            if (!combinedText.trim()) {
                alert("هیچ متنی برای خواندن پیدا نشد.");
                return;
            }

            isReading = true;
            updateButton(true);
            synth.cancel(); 

            currentUtterance = new SpeechSynthesisUtterance(combinedText);
            currentUtterance.lang = "fa-IR";
            currentUtterance.rate = 0.82;

            currentUtterance.onend = function() {
                isReading = false;
                updateButton(false);
            };

            currentUtterance.onerror = function() {
                isReading = false;
                updateButton(false);
            };

            synth.speak(currentUtterance);
        }
    </script>

</body>
</html>
