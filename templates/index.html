<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحلیل ایران | آخرین اخبار</title>
    <style>
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            background-color: #1a237e;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .news-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            unicode-bidi: embed;
        }
        .news-card:hover {
            transform: translateY(-5px);
        }
        .title-link {
            text-decoration: none;
            color: #d32f2f;
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            line-height: 1.5;
        }
        .meta {
            font-size: 0.85rem;
            color: #757575;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .summary {
            color: #424242;
            line-height: 1.8;
            font-size: 1rem;
        }
        .btn-more {
            display: inline-block;
            margin-top: 15px;
            color: #1a237e;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .btn-more:hover {
            text-decoration: underline;
        }

        /* استایل دکمه خبرخوان */
        #newsReaderBtn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background-color: #1b5e20; /* رنگ سبز تیره برای تمایز */
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-family: 'Tahoma', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        #newsReaderBtn:hover {
            background-color: #0d3d0f;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>XNew News</h1>
            <p>بروزرسانی لحظه‌ای اخبار منابع مختلف </p>
        </header>

        {% for item in news %}
        <div class="news-card">
            <a href="/news/{{ item[0] }}" class="title-link">{{ item[1] }}</a>
            <div class="meta">
                <span>منبع: <b>{{ item[2] }}</b></span> | 
                <span>زمان انتشار: {{ item[3] }}</span>
            </div>
            <div class="summary">
                {{ item[1][:250] }}...
            </div>
            
            <div class="full-desc-hidden" style="display:none;">{{ item[4] }}</div>

            <a href="/news/{{ item[0] }}" class="btn-more">ادامه مطلب و شرح کامل خبر ←</a>
        </div>
        {% endfor %}
    </div>

    <button id="newsReaderBtn" onclick="toggleSpeech()">
        <span id="btnIcon">🎙️</span> <span id="btnText">گوش دادن به اخبار</span>
    </button>

    <script>
        let synth = window.speechSynthesis;
        let isReading = false;

        function toggleSpeech() {
            if (isReading) {
                synth.cancel();
                isReading = false;
                document.getElementById('btnText').innerText = "گوش دادن به اخبار";
                document.getElementById('btnIcon').innerText = "🎙️";
                document.getElementById('newsReaderBtn').style.backgroundColor = "#1b5e20";
                return;
            }

            let articles = document.querySelectorAll('.news-card');
            let fullText = "";
            
            articles.forEach((article) => {
                let title = article.querySelector('.title-link').innerText;
                // فقط متن شرح کامل فارسی را از دایو مخفی برمی‌دارد
                let fullContent = article.querySelector('.full-desc-hidden').innerText;
                
                // ترکیب تیتر و شرح کامل (بدون خواندن منبع و تاریخ)
                fullText += title + " . " + fullContent + " . ";
            });

            if (!fullText.trim()) {
                alert("خبری برای خواندن موجود نیست.");
                return;
            }

            let utterance = new SpeechSynthesisUtterance(fullText);
            utterance.lang = 'fa-IR'; 
            utterance.rate = 0.9;     

            utterance.onstart = () => {
                isReading = true;
                document.getElementById('btnText').innerText = "توقف خواندن";
                document.getElementById('btnIcon').innerText = "🛑";
                document.getElementById('newsReaderBtn').style.backgroundColor = "#b71c1c";
            };

            utterance.onend = () => {
                isReading = false;
                document.getElementById('btnText').innerText = "گوش دادن به اخبار";
                document.getElementById('btnIcon').innerText = "🎙️";
                document.getElementById('newsReaderBtn').style.backgroundColor = "#1b5e20";
            };

            synth.speak(utterance);
        }
    </script>
</body>
</html>
