<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحلیل ایران | آخرین اخبار</title>

    <style>
        body {
            font-family: 'Tahoma', 'Arial', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background-color: #1a237e;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .news-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            unicode-bidi: embed;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        .title-link {
            text-decoration: none;
            color: #d32f2f;
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .meta {
            font-size: 0.85rem;
            color: #757575;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .summary {
            color: #424242;
            line-height: 1.8;
            font-size: 1rem;
        }

        .btn-more {
            display: inline-block;
            margin-top: 15px;
            color: #1a237e;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-more:hover {
            text-decoration: underline;
        }

        /* دکمه خبرخوان */
        #newsReaderBtn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(27, 94, 32, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 15px 25px;
            border-radius: 50px;
            font-family: 'Tahoma', sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.25);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        #newsReaderBtn:hover {
            transform: scale(1.05);
            background: rgba(13, 61, 15, 0.85);
        }

        @media (max-width: 768px) {
            #newsReaderBtn {
                left: 15px;
                bottom: 20px;
                padding: 12px 18px;
                font-size: 14px;
            }

            .title-link {
                font-size: 1.1rem;
            }

            .summary {
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>XNew News</h1>
            <p>بروزرسانی لحظه‌ای اخبار منابع مختلف</p>
        </header>

        {% for item in news %}
        <div class="news-card">

            <a href="/news/{{ item['id'] }}"
               class="title-link target-news-title"
               data-read="{{ item['title_fa']|e }}">
                {{ item['title_fa'] }}
            </a>

            <div class="meta">
                <span>منبع: <b>{{ item['source'] }}</b></span> |
                <span>زمان انتشار: {{ item['pub_date'] }}</span>
            </div>

            <div class="summary">
                {{ item['title_fa'][:250] }}...
            </div>

            <a href="/news/{{ item['id'] }}" class="btn-more">
                ادامه مطلب و شرح کامل خبر ←
            </a>

        </div>
        {% endfor %}

    </div>

    <!-- دکمه خبرخوان -->
    <button id="newsReaderBtn" onclick="toggleSpeech()">
        <span id="btnIcon">🎙️</span>
        <span id="btnText">گوش دادن به اخبار</span>
    </button>

    <script>

        let synth = window.speechSynthesis;
        let isReading = false;
        let stopRequested = false;
        let voices = [];

        /* بارگذاری صداها */
        function loadVoices() {
            voices = synth.getVoices();
        }

        loadVoices();

        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        /* تغییر ظاهر دکمه */
        function updateButton(state) {

            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const btn = document.getElementById('newsReaderBtn');

            if (state) {

                btnText.innerText = "توقف خواندن";
                btnIcon.innerText = "🛑";

                btn.style.background = "rgba(183, 28, 28, 0.85)";

            } else {

                btnText.innerText = "گوش دادن به اخبار";
                btnIcon.innerText = "🎙️";

                btn.style.background = "rgba(27, 94, 32, 0.75)";
            }
        }

        /* پاکسازی متن */
        function cleanText(text) {

            if (!text) return "";

            return text
                .replace(/https?:\/\/\S+/gi, "")
                .replace(/www\.\S+/gi, "")
                .replace(/[<>]/g, "")
                .replace(/[\r\n]+/g, " ")
                .replace(/\s+/g, " ")
                .trim();
        }

        /* انتخاب صدای فارسی */
        function getPersianVoice() {

            const faVoice = voices.find(v =>
                (v.lang || "").toLowerCase().startsWith("fa")
            );

            if (faVoice) return faVoice;

            const fuzzyVoice = voices.find(v =>
                /farsi|persian|iran/i.test(v.name || "") ||
                /fa/i.test(v.lang || "")
            );

            return fuzzyVoice || null;
        }

        /* خواندن خبرها به ترتیب */
        function speakNewsList(newsArray, index = 0) {

            if (stopRequested) {

                isReading = false;
                updateButton(false);
                return;
            }

            if (index >= newsArray.length) {

                isReading = false;
                updateButton(false);
                return;
            }

            let text = cleanText(newsArray[index]);

            if (!text) {
                speakNewsList(newsArray, index + 1);
                return;
            }

            let utterance = new SpeechSynthesisUtterance(text);

            utterance.lang = "fa-IR";
            utterance.rate = 0.9;
            utterance.pitch = 1;

            const selectedVoice = getPersianVoice();

            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }

            utterance.onend = () => {
                speakNewsList(newsArray, index + 1);
            };

            utterance.onerror = () => {
                speakNewsList(newsArray, index + 1);
            };

            synth.speak(utterance);
        }

        /* شروع / توقف */
        function toggleSpeech() {

            if (isReading) {

                stopRequested = true;
                synth.cancel();

                isReading = false;

                updateButton(false);

                return;
            }

            let titles = [...document.querySelectorAll('.target-news-title')]
                .map(el => cleanText(el.dataset.read || el.innerText))
                .filter(Boolean);

            if (!titles.length) {

                alert("متنی برای خواندن پیدا نشد.");
                return;
            }

            stopRequested = false;
            isReading = true;

            updateButton(true);

            speakNewsList(titles);
        }

    </script>

</body>
</html>
