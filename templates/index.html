<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحلیل ایران | آخرین اخبار</title>

    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background-color: #1a237e;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .news-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            unicode-bidi: embed;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        .title-link {
            text-decoration: none;
            color: #d32f2f;
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .meta {
            font-size: 0.85rem;
            color: #757575;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .summary {
            color: #424242;
            line-height: 1.8;
            font-size: 1rem;
        }

        .btn-more {
            display: inline-block;
            margin-top: 15px;
            color: #1a237e;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-more:hover {
            text-decoration: underline;
        }

        /* دکمه خبرخوان */
        #newsReaderBtn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(27,94,32,0.85);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-family: Tahoma, sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        #newsReaderBtn:hover {
            transform: scale(1.05);
        }

        @media(max-width:768px){
            #newsReaderBtn{
                left:15px;
                bottom:15px;
                padding:12px 18px;
                font-size:14px;
            }
            .title-link{
                font-size:1.1rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>XNew News</h1>
            <p>بروزرسانی لحظه‌ای اخبار منابع مختلف</p>
        </header>

        {% for item in news %}
        <div class="news-card">
            <a href="/news/{{ item['id'] }}" class="title-link">
                <span class="target-news-title">{{ item['title_fa'] }}</span>
            </a>

            <div class="meta">
                <span>منبع: <b>{{ item['source'] }}</b></span> | 
                <span>زمان انتشار: {{ item['pub_date'] }}</span>
            </div>

            <div class="summary">
                {{ item['desc_fa'][:250] }}...
            </div>

            <a href="/news/{{ item['id'] }}" class="btn-more">ادامه مطلب و شرح کامل خبر ←</a>
        </div>
        {% endfor %}

    </div>

    <button id="newsReaderBtn" onclick="toggleSpeech()">
        <span id="btnIcon">🎙️</span>
        <span id="btnText">گوش دادن به اخبار</span>
    </button>

    <script>
        const synth = window.speechSynthesis;
        let isReading = false;
        let newsQueue = []; 
        let currentIdx = 0;

        // تزریق مستقیم و امن تیترها از دیتابیس پایتون به آرایه جاوااسکریپت
        const rawNewsList = [
            {% for item in news %}
                "{{ item['title_fa'] | replace('\"', '') | replace('\'', '') | replace('\n', ' ') }}"{% if not loop.last %},{% endif %}
            {% endfor %}
        ];

        function updateButton(reading) {
            const btnText = document.getElementById("btnText");
            const btnIcon = document.getElementById("btnIcon");
            const btn = document.getElementById("newsReaderBtn");

            if (reading) {
                btnText.innerText = "توقف خواندن";
                btnIcon.innerText = "🛑";
                btn.style.background = "rgba(183,28,28,0.92)";
            } else {
                btnText.innerText = "گوش دادن به اخبار";
                btnIcon.innerText = "🎙️";
                btn.style.background = "rgba(27,94,32,0.85)";
            }
        }

        // تابع بهینه‌سازی شده برای تمیزکاری قطعی کلمات انگلیسی و علائم
        function cleanText(text) {
            if (!text) return "";
            let txt = text.trim();
            txt = txt.replace(/@[A-Za-z0-9_]+/g, ''); // حذف شناسه‌های توییتر
            txt = txt.replace(/[A-Za-z]/g, '');       // حذف حروف انگلیسی
            txt = txt.replace(/[^آاأإبپتثجچحخدذرزژسشصضطظعغفقکگلمنوهیًٌٍَُِّءیٓ‌\s0-9۰-۹]/g, ' '); // فقط حروف فارسی و اعداد
            return txt.replace(/\s+/g, ' ').trim();
        }

        // سیستم خوانش زنجیره‌ای برای مهار کردن خطای مرورگرهای ویندوز و آیفون
        function readNext() {
            if (!isReading || currentIdx >= newsQueue.length) {
                isReading = false;
                updateButton(false);
                return;
            }

            let textToRead = newsQueue[currentIdx];
            
            if (textToRead.length < 3) {
                currentIdx++;
                readNext();
                return;
            }

            // ایجاد مکث طبیعی قبل از شروع خبر بعدی با ویرگول فارسی
            if (currentIdx > 0) {
                textToRead = " ، ، خبر بعدی ، ، " + textToRead;
            }

            let utterance = new SpeechSynthesisUtterance(textToRead);
            utterance.lang = "fa-IR";
            utterance.rate = 0.9;

            utterance.onend = function() {
                currentIdx++;
                readNext();
            };

            utterance.onerror = function() {
                currentIdx++;
                readNext();
            };

            synth.speak(utterance);
        }

        function toggleSpeech() {
            if (isReading) {
                isReading = false;
                synth.cancel();
                updateButton(false);
                return;
            }

            // مپ کردن و فیلتر کردن لیست برای ساختن لیست نهایی قرائت
            newsQueue = rawNewsList.map(t => cleanText(t)).filter(t => t.length > 2);
            
            if (newsQueue.length === 0) {
                alert("هیچ تیتر خبری برای خواندن پیدا نشد.");
                return;
            }

            isReading = true;
            currentIdx = 0;
            updateButton(true);
            synth.cancel(); 

            // استارت چرخه خواندن
            readNext();
        }
    </script>

</body>
</html>
