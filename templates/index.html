<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحلیل ایران | آخرین اخبار</title>

    <style>
        body {
            font-family: Tahoma, Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            direction: rtl;
            text-align: right;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            background-color: #1a237e;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .news-card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.2s;
            unicode-bidi: embed;
        }

        .news-card:hover {
            transform: translateY(-5px);
        }

        .title-link {
            text-decoration: none;
            color: #d32f2f;
            font-size: 1.4rem;
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            line-height: 1.5;
        }

        .meta {
            font-size: 0.85rem;
            color: #757575;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .summary {
            color: #424242;
            line-height: 1.8;
            font-size: 1rem;
        }

        .btn-more {
            display: inline-block;
            margin-top: 15px;
            color: #1a237e;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-more:hover {
            text-decoration: underline;
        }

        /* دکمه خبرخوان */
        #newsReaderBtn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: rgba(27,94,32,0.85);
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-family: Tahoma, sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        #newsReaderBtn:hover {
            transform: scale(1.05);
        }

        @media(max-width:768px){
            #newsReaderBtn{
                left:15px;
                bottom:15px;
                padding:12px 18px;
                font-size:14px;
            }
            .title-link{
                font-size:1.1rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <h1>XNew News</h1>
            <p>بروزرسانی لحظه‌ای اخبار منابع مختلف</p>
        </header>

        {% for item in news %}
        <div class="news-card" data-pubdate="{{ item['pub_date'] }}">

            <a href="/news/{{ item['id'] }}" class="title-link target-news-title">
                {{ item['title_fa'] }}
            </a>

            <div class="meta">
                <span>منبع: <b>{{ item['source'] }}</b></span> | 
                <span>زمان انتشار: {{ item['pub_date'] }}</span>
            </div>

            <div class="summary">
                {{ item['desc_fa'][:250] }}...
            </div>

            <a href="/news/{{ item['id'] }}" class="btn-more">ادامه مطلب و شرح کامل خبر ←</a>
        </div>
        {% endfor %}

    </div>

    <button id="newsReaderBtn" onclick="toggleSpeech()">
        <span id="btnIcon">🎙️</span>
        <span id="btnText">گوش دادن به اخبار</span>
    </button>

    <script>
        const synth = window.speechSynthesis;
        let isReading = false;
        let stopReading = false;

        // تابع تمیزکننده: هر چیزی که الفبای فارسی نباشد (حروف انگلیسی، اعداد، آیکون‌ها، کدهای مخفی و علائم) را کاملاً پاک می‌کند
        function cleanTextToPurePersian(text) {
            if (!text) return "";
            
            // جایگزینی تمام آدرس‌های احتمالی با فاصله
            let cleaned = text.replace(/https?:\/\/\S+/gi, ' ').replace(/www\.\S+/gi, ' ');
            
            // فقط اجازه ورود به حروف الفبای فارسی و فضاهای خالی داده می‌شود (کارهای انگلیسی و علائم کلاً غیب می‌شوند)
            cleaned = cleaned.replace(/[^آاأإبپتثجچحخدذرزژسشصضطظعغفقکگلمنوهیًٌٍَُِّءیٓ‌\s]/g, ' ');
            
            // تبدیل فاصله‌های چندتایی به یک فاصله
            return cleaned.replace(/\s+/g, ' ').trim();
        }

        // تابع تشخیص زمان با لایه امنیتی بالا (فیلتر ۱۲ ساعت)
        function isWithinLast12Hours(dateString) {
            if (!dateString) return true; // اگر تاریخ خالی بود برای احتیاط خبر را بخواند
            try {
                // پاک‌سازی رشته تاریخ برای فهم بهتر در مرورگرها
                let normalizedDate = dateString.replace(/-/g, '/');
                let pubDate = new Date(normalizedDate);
                let now = new Date();

                // اگر سیستم تاریخ لود نشد یا فیلد غیر عددی بود
                if (isNaN(pubDate.getTime())) {
                    return true; 
                }

                let diffInHours = (now - pubDate) / (1000 * 60 * 60);
                
                // بررسی محدوده ۱۲ ساعت قبل
                return diffInHours >= 0 && diffInHours <= 12;
            } catch (e) {
                return true; 
            }
        }

        function updateButton(reading) {
            const btnText = document.getElementById("btnText");
            const btnIcon = document.getElementById("btnIcon");
            const btn = document.getElementById("newsReaderBtn");

            if (reading) {
                btnText.innerText = "توقف خواندن";
                btnIcon.innerText = "🛑";
                btn.style.background = "rgba(183,28,28,0.92)";
            } else {
                btnText.innerText = "گوش دادن به اخبار";
                btnIcon.innerText = "🎙️";
                btn.style.background = "rgba(27,94,32,0.85)";
            }
        }

        function speakNews(newsArray, index = 0) {
            if (stopReading || index >= newsArray.length) {
                isReading = false;
                updateButton(false);
                return;
            }

            let text = newsArray[index];

            // اگر متن به هر دلیلی بعد از فیلتر خالی شد، برو خبر بعدی
            if (!text || text.length < 2) {
                speakNews(newsArray, index + 1);
                return;
            }

            synth.cancel();

            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = "fa-IR";
            utterance.rate = 0.85;

            utterance.onend = function () {
                setTimeout(() => {
                    speakNews(newsArray, index + 1);
                }, 300);
            };

            utterance.onerror = function () {
                speakNews(newsArray, index + 1);
            };

            synth.speak(utterance);
        }

        function toggleSpeech() {
            if (isReading) {
                stopReading = true;
                synth.cancel();
                isReading = false;
                updateButton(false);
                return;
            }

            const cards = document.querySelectorAll(".news-card");
            let newsTexts = [];

            cards.forEach(card => {
                const pubDateStr = card.getAttribute("data-pubdate");
                
                // اعمال فیلتر ۱۲ ساعته اخبار
                if (isWithinLast12Hours(pubDateStr)) {
                    const titleElement = card.querySelector(".target-news-title");
                    if (titleElement) {
                        let pureText = cleanTextToPurePersian(titleElement.textContent);
                        if (pureText && pureText.length > 2) {
                            newsTexts.push(pureText);
                        }
                    }
                }
            });

            if (newsTexts.length === 0) {
                alert("خبری در محدوده ۱۲ ساعت اخیر برای خواندن یافت نشد.");
                return;
            }

            stopReading = false;
            isReading = true;
            updateButton(true);
            speakNews(newsTexts);
        }
    </script>

</body>
</html>
