<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ item.title }} - خبر آنالیزبان</title>
    <style>
        body { font-family: 'Tahoma', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; line-height: 1.8; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #0088cc; font-size: 24px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .meta { font-size: 13px; color: #888; margin-bottom: 20px; display: flex; justify-content: space-between; }
        .content { font-size: 17px; text-align: justify; white-space: pre-wrap; }
        .back-btn { display: inline-block; margin-top: 30px; padding: 10px 20px; background: #0088cc; color: white; text-decoration: none; border-radius: 5px; }
        .source-link { color: #ff5722; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="meta">
            <span>منبع: <b>{{ item.source }}</b></span>
            <span>تاریخ: {{ item.date }}</span>
        </div>
        <h1>{{ item.title }}</h1>
        <div class="content">
            {{ item.content }}
        </div>
        <hr>
        <p>🔗 مشاهده متن اصلی در منبع: <a href="{{ item.original_link }}" class="source-link" target="_blank">کلیک کنید</a></p>
        <a href="/" class="back-btn">← بازگشت به صفحه اصلی</a>
    </div>
</body>
</html>
