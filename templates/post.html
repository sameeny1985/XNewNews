<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: Tahoma, Arial; direction: rtl; padding: 30px; max-width: 800px; margin: auto; line-height: 1.8; }
        .content { background: white; padding: 20px; border-radius: 10px; unicode-bidi: embed; }
        .meta { color: #777; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>{{ title }}</h1>
    <div class="meta">منبع: {{ source }} | تاریخ: {{ date }}</div>
    <hr>
    <div class="content">
        {{ content | safe }}
    </div>
    <br>
    <a href="{{ original }}">لینک به منبع اصلی خبر</a>
    <br><br>
    <a href="/">بازگشت به صفحه اصلی</a>
</body>
</html>
